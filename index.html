<!DOCTYPE html>
<html>
<head>
    <title>Регистрация мастера</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Начни принимать записи</h1>
    <p>Это бесплатно. Потом решите, нужно ли больше</p>
    
    <form id="registerForm">
        <input type="text" placeholder="Ваше имя" required>
        <input type="tel" placeholder="Телефон" required>
        <input type="text" placeholder="Telegram (необязательно)">
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
